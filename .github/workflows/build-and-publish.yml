# ============================================================
# Workflow GitHub Actions — Construction et publication de l'image Docker
#
# Déclenché à chaque push sur la branche principale (main).
# Construit l'image pour linux/amd64 (Intel DS218+) et la
# publie sur GitHub Container Registry (GHCR).
# ============================================================

name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  # Permet de déclencher manuellement depuis l'interface GitHub
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Nécessaire pour publier sur GHCR

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN est fourni automatiquement par GitHub — aucun secret à configurer.

      - name: Extraction des métadonnées (tags et labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag "latest" pour la branche principale
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag avec le SHA du commit (pour revenir en arrière si besoin)
            type=sha,prefix=sha-,format=short
            # Tag de date (optionnel, pratique pour retrouver une version)
            type=raw,value={{date 'YYYY-MM-DD'}},enable={{is_default_branch}}

      - name: Configuration de QEMU (multi-architecture)
        uses: docker/setup-qemu-action@v3

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Récupération de la date et du SHA
        id: version
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(TZ=Europe/Paris date '+%d/%m/%Y %H:%M')" >> $GITHUB_OUTPUT

      - name: Construction et publication de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Architecture cible : Intel Celeron J3355 du DS218+ (x86-64)
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.version.outputs.sha }}
            BUILD_DATE=${{ steps.version.outputs.date }}
          # Cache entre les builds pour accélérer les constructions suivantes
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du déploiement
        run: |
          echo "### ✅ Image publiée avec succès" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags publiés :**" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Watchtower détectera la nouvelle image \`latest\` dans quelques minutes et mettra à jour le NAS automatiquement." >> $GITHUB_STEP_SUMMARY
