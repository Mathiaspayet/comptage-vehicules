# ============================================================
# docker-compose.yml — Comptage de véhicules
#
# À déposer sur le NAS (avec config.yaml) et à démarrer
# via Container Manager ou : docker compose up -d
#
# AVANT DE DÉMARRER :
#   1. Créez le dossier /volume2/docker/comptage/data/ sur le NAS
#   2. Démarrez les conteneurs — la configuration se fait via l'interface web
#      http://[IP-NAS]:8080/config/
# ============================================================

services:

  # --------------------------------------------------------
  # Application principale
  # --------------------------------------------------------
  comptage:
    image: ghcr.io/mathiaspayet/comptage-vehicules:latest

    container_name: comptage-vehicules
    restart: always

    ports:
      - "8080:8080"   # Tableau de bord  → http://[IP-NAS]:8080
      - "8081:8081"   # Calibration      → http://[IP-NAS]:8081

    volumes:
      # Vidéos de la sonnette (lecture seule — l'app ne peut pas les modifier)
      # L'app scanne aussi les sous-dossiers (20260427PM, 20260428AM…)
      - /volume2/surveillance/Interphone:/video:ro

      # Données persistantes (base de données, config, logs, modèle IA)
      - /volume2/docker/comptage/data:/app/data

    environment:
      - CONFIG_PATH=/app/data/config.yaml
      - TZ=Europe/Paris  # Fuseau horaire du NAS — à ajuster si besoin

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

